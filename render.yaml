---
services:
  - type: web
    name: mba-backend-main
    env: python
    plan: starter
    region: oregon
    branch: main
    pythonVersion: 3.11.9
    buildCommand: ./render-build.sh
    startCommand: >-
      bash -c "if [ -f /opt/render/project/.venv/bin/activate ]; then
        source /opt/render/project/.venv/bin/activate
      fi
      PORT_VALUE=\"${PORT:-8000}\" && \
      GUNICORN_LOG_LEVEL=\"${GUNICORN_LOG_LEVEL:-${LOG_LEVEL:-info}}\" && \
      echo \"PORT=${PORT} resolved_port=${PORT_VALUE}\" && \
      echo \"INIT_DB_ON_STARTUP=${INIT_DB_ON_STARTUP}\" && \
      echo \"MPLCONFIGDIR=${MPLCONFIGDIR}\" && \
      echo \"GUNICORN_LOG_LEVEL=${GUNICORN_LOG_LEVEL}\" && \
      echo \"Launching gunicorn with: -w 1 -t 180 --graceful-timeout 180 --log-level ${GUNICORN_LOG_LEVEL}\" && \
      services:
        - type: web
          name: blank-app-backend
          runtime: docker
          dockerfilePath: ./backend/Dockerfile
          envVars:
            - key: DATABASE_URL
              fromDatabase:
                name: blank-app-db
                property: connectionString
            - key: SECRET_KEY
              generateValue: true
          healthCheckPath: /health
          autoDeploy: true

        - type: web
          name: blank-app-frontend
          runtime: docker
          dockerfilePath: ./frontend/Dockerfile
          envVars:
            - key: REACT_APP_API_URL
              value: https://blank-app-backend.onrender.com
          autoDeploy: true

      databases:
        - name: blank-app-db
          databaseName: blankapp
          user: blankapp
          plan: standard
      - key: INSTALL_DEV_REQUIREMENTS
